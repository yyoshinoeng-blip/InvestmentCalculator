<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>資産運用シミュレーター</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 自作CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/app.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-4 text-center">
      資産運用シミュレーター
    </h1>

    <div class="space-y-4">

      <div>
        <label>元本（円）</label>
        <input id="principal" type="number" class="input">
      </div>

      <div>
        <label>毎月積立（円）</label>
        <input id="monthly" type="number" class="input">
      </div>

      <div>
        <label>年利（％）</label>
        <input id="rate" type="number" step="0.1" class="input">
      </div>

      <div>
        <label>運用年数（年）</label>
        <input id="years" type="number" class="input">
      </div>

      <button id="runBtn" class="btn">
        シミュレーション実行
      </button>

    </div>

    <div class="mt-6 text-center">
      <p class="text-lg font-semibold">
        最終資産額：
        <span id="result">---</span> 円
      </p>
    </div>

    <div class="mt-6">
      <canvas id="chart"></canvas>
    </div>

  </div>

  <!-- 自作JS -->
  <script src="js/app.js"></script>
</body>
</html>
